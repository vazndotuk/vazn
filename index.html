<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#050505;
color:white;
height:100vh;
overflow:hidden;
}

/* INTRO SCREEN */

#intro{
position:fixed;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:#050505;
z-index:10;
transition:opacity 1s ease;
}

/* CLICK BUTTON */

#intro button{

background:transparent;
border:1px solid rgba(255,255,255,0.35);
color:white;

font-size:clamp(20px,2vw,26px);
padding:22px 60px;

cursor:pointer;

transition:all .3s ease;

letter-spacing:1px;
}

#intro button:hover{

background:rgba(255,255,255,0.08);
border-color:white;

}

/* MAIN SITE */

#main{
opacity:0;
transition:opacity 1.5s ease;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* SPOTLIGHT */

.spotlight{
position:fixed;
inset:0;
background:radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 60%);
pointer-events:none;
z-index:-2;
}

/* CURSOR GLOW */

.cursor-glow{
position:fixed;
width:320px;
height:320px;
border-radius:50%;
background:radial-gradient(circle, rgba(255,255,255,0.15), transparent 65%);
pointer-events:none;
transform:translate(-50%,-50%);
z-index:-1;
transition:transform .05s linear;
}

/* CONTENT */

.container{
max-width:900px;
padding:40px 20px;
position:relative;
}

/* EDIT LABEL */

.edit{
position:absolute;
right:0;
top:-10px;
opacity:.5;
font-size:14px;
}

/* TITLE */

.title{
font-size:clamp(42px,6vw,70px);
font-weight:700;
line-height:1.1;
margin-bottom:25px;
}

/* PROFILE PICTURE */

.pfp{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin:20px auto;
border:2px solid rgba(255,255,255,0.25);
}

/* DESCRIPTION */

.description{
max-width:620px;
margin:20px auto 40px auto;
opacity:.75;
line-height:1.6;
font-size:16px;
}

/* SOCIAL LINKS */

.socials{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:24px;
}

.socials a{
text-decoration:none;
color:white;
opacity:.7;
font-size:16px;
transition:.3s;
}

.socials a:hover{
opacity:1;
}

/* MOBILE */

@media(max-width:700px){

#intro button{
padding:18px 40px;
font-size:20px;
}

.title{
font-size:38px;
}

.pfp{
width:95px;
height:95px;
}

.description{
font-size:14px;
}

}

</style>
</head>
<body>

<!-- INTRO -->

<div id="intro">
<button onclick="startSite()">Click Anywhere</button>
</div>

<!-- MUSIC -->

<audio id="music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<!-- EFFECTS -->

<div class="cursor-glow" id="glow"></div>
<div class="spotlight"></div>

<!-- MAIN CONTENT -->

<div id="main">

<div class="container">

<div class="title">
vazN<br>
</div>

<img src="pfp.jpg" class="pfp">

<div class="description">
hi
</div>

<div class="socials">
<a href="#">Wire</a>
<a href="#">idk</a>
<a href="https://t.me/restitutive">Telegram</a>
</div>

</div>

</div>

<script>

/* START SITE */

function startSite(){

const intro=document.getElementById("intro")
const main=document.getElementById("main")
const music=document.getElementById("music")

music.play()

intro.style.opacity="0"

setTimeout(()=>{
intro.style.display="none"
main.style.opacity="1"
},1000)

}

/* CURSOR GLOW */

const glow=document.getElementById("glow")

document.addEventListener("mousemove",e=>{
glow.style.left=e.clientX+"px"
glow.style.top=e.clientY+"px"
})

/* DISABLE GLOW ON MOBILE */

if(window.innerWidth < 700){
glow.style.display="none"
}

</script>

</body>
</html>
