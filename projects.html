<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>vazN / projects</title>

    <meta name="keywords" content="vazn, vazn.uk, projects, source code, @vazn.uk, info@vazn.uk">

    <!-- Search Engine Indexing -->

    <meta name="googlebot" content="index, follow">

    <!-- Canonical URL (important for SEO) -->

    <!-- Open Graph (Discord, Telegram, Facebook, etc.) -->
    <meta property="og:title" content="vazN / projects">
    <meta property="og:description" content="source code / info@vazn.uk">
    <meta property="og:url" content="https://vazn.uk/projects">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="vazN">

    <!-- Twitter Card (used by many platforms) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="vazN / projects">
    <meta name="twitter:description" content="source code / info@vazn.uk">

    <!-- Theme color (optional, nice for browsers) -->
    <meta name="theme-color" content="#000000">

<style>

html,body{
    margin:0;
    height:100%;
    background:black;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

/* spotlight background */
body{
    background: radial-gradient(
        circle at var(--x) var(--y),
        rgba(255,255,255,0.08),
        rgba(0,0,0,0.95) 300px
    );
    transition:background 0.05s linear;
}

/* loading screen */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#loaderText{
    font-size:18px;
    opacity:0;
    animation:fadeIn 1s forwards;
}

@keyframes fadeIn{
    from{opacity:0}
    to{opacity:1}
}

@keyframes liftAway{
    0%{transform:translateY(0)}
    100%{transform:translateY(-120%)}
}

/* main content */
#content{
    text-align:center;
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    opacity:0;
    animation:contentFade 1.5s ease forwards;
    animation-delay:1s;
}

@keyframes contentFade{
    from{opacity:0; transform:translate(-50%,-40%)}
    to{opacity:1; transform:translate(-50%,-50%)}
}

/* title */
h1{
    font-size:64px;
    margin-bottom:35px;
    cursor:pointer;
}

/* shake animation */
@keyframes shake{
    0%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
    100%{transform:translateX(0)}
}

.shake{
    animation:shake 0.6s ease;
}

/* links */
.links{
    width:240px;
    margin:auto;
}

.links a{
    display:block;
    color:white;
    text-decoration:none;
    padding:14px 0;
    letter-spacing:1px;
}

.links a:hover{
    opacity:0.7;
}

.line{
    width:100%;
    height:1px;
    background:white;
    opacity:0.4;
}

/* snow particles */

.particle{
    position:fixed;
    pointer-events:none;
    color:white;
    font-size:12px;
    opacity:0.9;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(120px);
        opacity:0;
    }
}

</style>
</head>

<body>

<div id="loader">
<div id="loaderText">loading...</div>
</div>

<div id="content">
<h1 id="title">projects / source code</h1>

<div class="links">
<div class="line"></div>
<a href="/files/monivo-browser-main.zip">monivo browser</a>
<div class="line"></div>
<a href="/files/revault-main.zip">revault</a>
<div class="line"></div>
<a href="/files/revaultpass-main.zip">revault pass</a>
<div class="line"></div>
<a href="#">home</a>
<div class="line"></div>
</div>
</div>

<script>

/* loader animation */

setTimeout(()=>{
    const loader=document.getElementById("loader")
    loader.style.animation="liftAway 1.2s cubic-bezier(.7,0,.3,1) forwards"
},900)

/* title shake */

const title=document.getElementById("title")

title.onclick=()=>{
    title.classList.remove("shake")
    void title.offsetWidth
    title.classList.add("shake")
}

/* spotlight follow mouse */

document.addEventListener("mousemove",e=>{
    document.body.style.setProperty("--x",e.clientX+"px")
    document.body.style.setProperty("--y",e.clientY+"px")

    spawnSnow(e.clientX,e.clientY)
})

/* snow particle trail */

function spawnSnow(x,y){

    const particle=document.createElement("div")
    particle.className="particle"
    particle.innerHTML="❄"

    particle.style.left=x+"px"
    particle.style.top=y+"px"

    const size=Math.random()*10+8
    particle.style.fontSize=size+"px"

    const duration=Math.random()*0.8+0.6
    particle.style.animationDuration=duration+"s"

    document.body.appendChild(particle)

    setTimeout(()=>{
        particle.remove()
    },duration*1000)
}

</script>

</body>
</html>
